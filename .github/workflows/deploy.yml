- name: Deploy to EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ubuntu
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      export NVM_DIR="$HOME/.nvm"
      source "$NVM_DIR/nvm.sh"

      node -v
      npm -v

      cd ~/test-project

      git pull origin main

      npm install

      npm run build

      sudo systemctl restart nginx
